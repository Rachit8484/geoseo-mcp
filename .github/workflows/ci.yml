name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python }}

      - name: Install deps
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Test (pytest)
        run: uv run pytest -q

      - name: Build
        run: uv build

      - name: Smoke-test wheel
        run: |
          uv run --isolated --with ./dist/geoseo_mcp-*.whl python -c "
          import asyncio
          from geoseo_mcp.server import build_server
          tools = asyncio.run(build_server().list_tools())
          assert len(tools) >= 36, f'expected >=36 tools, got {len(tools)}'
          print(f'OK: {len(tools)} tools registered')
          "
